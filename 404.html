<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Satyam Patel</title>
  <meta name="robots" content="noindex" />
  <meta name="theme-color" content="#060609" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100svh;
      display: grid; place-items: center;
      background: #060609; color: #ecedf2;
      font-family: "Space Grotesk", system-ui, sans-serif;
      text-align: center;
      overflow: hidden;
      position: relative;
    }
    .blob {
      position: fixed; border-radius: 50%;
      filter: blur(100px); opacity: 0.18; pointer-events: none;
      animation: drift 18s ease-in-out infinite alternate;
    }
    .b1 { width: 50vw; height: 50vw; background: #6366f1; top: -16vw; left: -10vw; }
    .b2 { width: 40vw; height: 40vw; background: #22d3ee; bottom: -14vw; right: -8vw; animation-delay: -8s; }
    @keyframes drift {
      from { transform: translate(0, 0) scale(1); }
      to { transform: translate(5vw, 5vh) scale(1.15); }
    }
    .wrap { position: relative; padding: 2rem; }
    h1 {
      font-size: clamp(6rem, 24vw, 14rem);
      font-weight: 700; line-height: 1;
      background: linear-gradient(100deg, #6366f1, #a855f7 45%, #22d3ee);
      background-size: 200% 100%;
      -webkit-background-clip: text; background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: shift 5s ease infinite;
    }
    @keyframes shift { 0%, 100% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } }
    p {
      font-family: "JetBrains Mono", monospace;
      color: #9a9cad; font-size: clamp(0.85rem, 2.5vw, 1.05rem);
      margin: 1.2rem 0 2.4rem;
    }
    a {
      display: inline-block;
      padding: 0.95rem 2.2rem; border-radius: 99px;
      background: linear-gradient(100deg, #6366f1, #a855f7 45%, #22d3ee);
      color: #fff; text-decoration: none; font-weight: 600;
      box-shadow: 0 8px 32px rgba(124, 77, 247, 0.45);
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.3s;
    }
    a:hover { transform: translateY(-3px); box-shadow: 0 14px 44px rgba(124, 77, 247, 0.6); }
  </style>
</head>
<body>
  <div class="blob b1"></div>
  <div class="blob b2"></div>
  <div class="wrap">
    <h1>404</h1>
    <p>// page not found — lost somewhere in latent space</p>
    <a href="/">← Back to the portfolio</a>
  </div>
</body>
</html>
